app = "openclaw-license"
primary_region = "nrt"

[build]

[env]
  LICENSE_DB_PATH = "/data/license.db"
  LICENSE_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "license_data"
  destination = "/data"
